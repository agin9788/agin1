<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<!-- 关键：添加视口适配标签 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>颜色大全 - 带中文名 点击复制</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
/* 竖屏适配：body 内边距自适应 */
body{background:#f5f7fa;padding:10px 5px;}
.wrap{max-width:1400px;margin:0 auto;width:100%;}
h1{text-align:center;margin-bottom:8px;font-size:18px;/* 竖屏字体缩小 */}
.desc{text-align:center;color:#666;margin-bottom:16px;font-size:14px;/* 竖屏字体缩小 */}
/* 竖屏适配：网格列数自适应，最小宽度调整，间距缩小 */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;padding:0 5px;}
/* 竖屏适配：色块高度调整，保证触控面积 */
.item{height:100px;border-radius:8px;display:flex;flex-direction:column;
align-items:center;justify-content:center;cursor:pointer;
box-shadow:0 2px 5px rgba(0,0,0,0.1);user-select:none;
/* 增加点击反馈 */
touch-action:manipulation;
-webkit-tap-highlight-color:transparent;
}
/* 竖屏适配：色值字体调整 */
.hex{color:#fff;font-weight:bold;text-shadow:0 0 3px #000;margin-bottom:2px;font-size:14px;}
/* 竖屏适配：名称字体调整 */
.name{color:#fff;font-size:16px;text-shadow:0 0 3px #000;text-align:center;}
/* 竖屏适配：提示框样式优化 */
.tip{position:fixed;top:10px;left:50%;transform:translateX(-50%);
background:rgba(34,34,34,0.9);/* 半透明更友好 */
color:#fff;padding:8px 12px;border-radius:6px;
opacity:0;transition:all 0.3s;
font-size:14px;max-width:80%;text-align:center;
z-index:9999;/* 确保提示框在最上层 */
}
.tip.show{opacity:1;}
/* 媒体查询：针对小屏手机（竖屏）的精细化适配 */
@media screen and (max-width: 375px) {
  .grid{grid-template-columns:repeat(auto-fill,minmax(85px,1fr));gap:6px;}
  .item{height:90px;}
  .hex{font-size:12px;}
  .name{font-size:14px;}
  h1{font-size:16px;}
  .desc{font-size:12px;}
}
/* 媒体查询：针对大屏手机（竖屏） */
@media screen and (min-width: 414px) and (max-width: 767px) {
  .grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));}
  .item{height:105px;}
}
</style>
</head>
<body>
<div class="wrap">
  <h1>常用颜色表</h1>
  <p class="desc">点击色块复制色值，附带中文名称</p>
  <div class="grid" id="box"></div>
  <div class="tip" id="tip"></div>
</div>

<script>
const colorList = [
  {name:"纯黑",color:"#000000"},
  {name:"深灰",color:"#333333"},
  {name:"中灰",color:"#666666"},
  {name:"浅灰",color:"#999999"},
  {name:"银灰",color:"#cccccc"},
  {name:"白色",color:"#ffffff"},

  {name:"中国红",color:"#AA1409"},
  {name:"正红",color:"#FF0000"},
  {name:"玫红",color:"#FF0099"},
  {name:"酒红",color:"#8B0000"},
  {name:"粉红",color:"#FFC0CB"},
  {name:"豆沙红",color:"#C3272B"},

  {name:"橘红",color:"#FF4500"},
  {name:"橙色",color:"#FF9900"},
  {name:"橘黄",color:"#FFB300"},
  {name:"金黄",color:"#FFD700"},
  {name:"明黄",color:"#FFFF00"},
  {name:"米黄",color:"#FFF8DC"},

  {name:"草绿",color:"#32CD32"},
  {name:"墨绿",color:"#006400"},
  {name:"翠绿",color:"#00FF00"},
  {name:"豆绿",color:"#9ACD32"},
  {name:"薄荷绿",color:"#98FB98"},
  {name:"青色",color:"#00FFFF"},

  {name:"天蓝",color:"#87CEEB"},
  {name:"深蓝",color:"#00008B"},
  {name:"海蓝",color:"#1E90FF"},
  {name:"雾霾蓝",color:"#738796"},
  {name:"浅蓝",color:"#ADD8E6"},
  {name:"藏青",color:"#191970"},

  {name:"紫色",color:"#9932CC"},
  {name:"紫罗兰",color:"#8A2BE2"},
  {name:"淡紫",color:"#E6E6FA"},
  {name:"藕荷色",color:"#E0B0FF"},

  {name:"咖啡色",color:"#8B4513"},
  {name:"棕色",color:"#A0522D"},
  {name:"卡其色",color:"#F5DEB3"},
  {name:"驼色",color:"#D2B48C"},
  {name:"米色",color:"#F5F5DC"},
  {name:"杏色",color:"#FFE4B5"},

  {name:"黑色",color:"#000000"},
  {name:"红色",color:"#FF0000"},
  {name:"绿色",color:"#00FF00"},
  {name:"蓝色",color:"#0000FF"},
  {name:"黄色",color:"#FFFF00"},
  {name:"品红",color:"#FF00FF"},

  {name:"浅粉",color:"#FFD1DC"},
  {name:"桃色",color:"#FFDAB9"},
  {name:"橙红",color:"#FF3300"},
  {name:"黄绿",color:"#CCFF00"},
  {name:"蓝绿",color:"#00FFCC"},
  {name:"紫蓝",color:"#6600FF"},

  {name:"象牙白",color:"#FFFFF0"},
  {name:"月光白",color:"#F8F8FF"},
  {name:"石墨灰",color:"#2C2C32"},
  {name:"青砖灰",color:"#6B7074"},
  {name:"玫瑰粉",color:"#F596AA"},
  {name:"樱桃红",color:"#D71345"}
];

const box = document.getElementById('box');
const tip = document.getElementById('tip');

colorList.forEach(item => {
  let div = document.createElement('div');
  div.className = 'item';
  div.style.background = item.color;
  div.innerHTML = `
    <div class="hex">${item.color}</div>
    <div class="name">${item.name}</div>
  `;
  // 适配移动端点击（解决300ms延迟）
  div.addEventListener('click', () => {
    // 兼容移动端复制
    if (navigator.clipboard) {
      // 现代浏览器复制API
      navigator.clipboard.writeText(item.color).then(() => {
        showTip(`已复制：${item.color} ${item.name}`);
      }).catch(err => {
        // 降级方案
        fallbackCopyTextToClipboard(item.color);
        showTip(`已复制：${item.color} ${item.name}`);
      });
    } else {
      // 兼容老浏览器
      fallbackCopyTextToClipboard(item.color);
      showTip(`已复制：${item.color} ${item.name}`);
    }
  });
  box.appendChild(div);
});

// 复制降级函数
function fallbackCopyTextToClipboard(text) {
  let ta = document.createElement('textarea');
  ta.value = text;
  // 防止滚动到页面外
  ta.style.position = 'fixed';
  ta.style.top = '0';
  ta.style.left = '0';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
  } catch (err) {
    console.error('Fallback: 无法复制', err);
  }
  document.body.removeChild(ta);
}

// 提示框函数
function showTip(text) {
  tip.textContent = text;
  tip.classList.add('show');
  setTimeout(() => tip.classList.remove('show'), 1500);
}
</script>
</body>
</html>
