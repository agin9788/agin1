<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>水果连连看</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            margin:0; padding:0;
        }
        html,body {
            width:100%;
            height:100%;
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            font-family: system-ui,-apple-system,'Microsoft YaHei',sans-serif;
            overflow:hidden;
        }
        .game-container {
            width:100vw;
            height:100vh;
            background:rgba(0,0,0,0.3);
            display:flex;
            flex-direction:column;
            /* 适配电脑端最小尺寸 */
            min-width: 320px;
            min-height: 480px;
        }
        .game-panel {
            flex:1;
            background:#fef5e8;
            padding:6px;
            display:flex;
            flex-direction:column;
            gap:6px;
            /* 防止内容溢出 */
            overflow: hidden;
        }

        .top-row {
            display:flex;
            justify-content: center;
            align-items: center;
            background:#fff3e0;
            padding:6px 10px;
            border-radius:16px;
            /* 适配小屏幕 */
            flex-wrap: wrap;
            gap: 4px;
        }
        .btn-row {
            display:flex;
            justify-content: center;
            gap:10px;
            background:#fff3e0;
            padding:6px 10px;
            border-radius:16px;
            /* 适配小屏幕按钮换行 */
            flex-wrap: wrap;
        }

        .stats {
            display:flex; 
            gap:8px; /* 缩小间距适配小屏 */
            background:#2d2b26;
            padding:4px 8px;
            border-radius:20px;
            color:#ffefcf;
            font-weight:bold;
            /* 适配小屏幕 */
            flex-wrap: wrap;
            justify-content: center;
        }
        .stat {
            display:flex; align-items:center; gap:4px;
            font-size:0.75rem;
        }
        .stat-label {
            font-size:0.6rem;
            background:#1f1c18;
            padding:2px 6px;
            border-radius:12px;
            color:#ffdd99;
        }
        .stat-value {
            font-size:1rem;
            font-family:monospace;
            min-width:32px;
            text-align:center;
            color:#f7d44a;
        }
        .btn {
            flex:1;
            /* 适配电脑端按钮最大宽度，手机端自适应 */
            min-width: 80px;
            max-width: 120px;
            background:#fff0da;
            border:none;
            font-size:0.75rem;
            font-weight:bold;
            padding:8px 10px; /* 增加点击区域 */
            border-radius:16px;
            color:#2c4a2e;
            box-shadow:0 1px 0 #b59a6b;
            touch-action:manipulation;
            /* 电脑端hover效果 */
            transition: all 0.2s ease;
        }
        /* 电脑端按钮hover */
        .btn:hover {
            background:#ffe8c0;
            cursor: pointer;
        }
        .btn:active {
            transform:translateY(1px);
            box-shadow:0 0 0 #b59a6b;
        }
        .btn-primary {
            background:#ffcd7e;
            color:#452b10;
            box-shadow:0 1px 0 #b46f2e;
        }
        .btn-primary:hover {
            background:#ffb858;
        }

        .canvas-wrapper {
            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
            /* 限制画布容器最大尺寸，适配电脑端 */
            max-width: 80vh;
            max-height: 80vh;
            margin: 0 auto;
        }
        canvas {
            display:block;
            /* 核心：自适应宽高，保持1:1比例 */
            width: 100%;
            height: 100%;
            max-width: 500px; /* 电脑端最大宽度 */
            max-height: 500px; /* 电脑端最大高度 */
            background:#faf0e1;
            border-radius:12px;
            /* 电脑端鼠标样式 */
            cursor: pointer;
        }

        .footer {
            display:flex;
            justify-content: center;
            padding: 4px 0;
        }
        .message-area {
            text-align:center;
            font-weight:bold;
            font-size:0.75rem;
            background:#1f2a1b;
            padding:6px 16px;
            border-radius:20px;
            color:#ffeaac;
            max-width: 90%; /* 适配小屏幕 */
            /* 防止文字溢出 */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 媒体查询：电脑端（宽度>768px）优化 */
        @media (min-width: 768px) {
            .stat {
                font-size: 0.85rem;
            }
            .stat-label {
                font-size: 0.7rem;
            }
            .stat-value {
                font-size: 1.1rem;
                min-width: 40px;
            }
            .btn {
                font-size: 0.85rem;
                padding: 10px 12px;
                min-width: 100px;
                max-width: 150px;
            }
            .message-area {
                font-size: 0.85rem;
                padding: 8px 20px;
            }
        }

        /* 媒体查询：小屏手机（宽度<375px）优化 */
        @media (max-width: 375px) {
            .stats {
                gap: 4px;
            }
            .stat-label {
                font-size: 0.55rem;
                padding: 2px 4px;
            }
            .stat-value {
                font-size: 0.9rem;
                min-width: 28px;
            }
            .btn {
                min-width: 70px;
                font-size: 0.7rem;
                padding: 6px 8px;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-panel">
        <div class="top-row">
            <div class="stats">
                <div class="stat">
                    <span class="stat-label">⏱️ 剩余</span>
                    <span class="stat-value" id="timerDisplay">00:00</span>
                </div>
                <div class="stat">
                    <span class="stat-label">🎯 得分</span>
                    <span class="stat-value" id="scoreDisplay">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">🧩 剩余</span>
                    <span class="stat-value" id="remainPairs">0</span>
                </div>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn" id="shuffleBtn">🃏 洗牌</button>
            <button class="btn btn-primary" id="hintBtn">💡 提示</button>
            <button class="btn" id="resetBtn">🔄 新局</button>
        </div>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas"></canvas>
        </div>

        <div class="footer">
            <div class="message-area" id="gameMsg">✨ 点击配对，直线/拐角消除 ✨</div>
        </div>
    </div>
</div>

<script>
(function(){
    const ROWS = 8;
    const COLS = 8;
    const ICON_SET = ["🍎","🍊","🍒","🍓","🥝","🍉","🍇","🥥"];
    const PAIR_COUNT_PER_TYPE = (ROWS*COLS)/ICON_SET.length;
    const SCORE_PER_PAIR = 10;
    const TIME_ADD_ON_MATCH = 1;    // 正确+1秒
    const TIME_MINUS_ON_WRONG = 5;  // 错误-5秒
    const SCORE_PER_REMAIN_SEC = 2; // 剩余1秒=2分
    let TIME_LIMIT = 90;

    let grid = [];
    let selectedRow = null, selectedCol = null;
    let hintRow1=null,hintCol1=null,hintRow2=null,hintCol2=null;
    let currentScore=0, remainingPairs=0, timeLeft=TIME_LIMIT;
    let timerInterval=null, gameActive=true, gameWinFlag=false;

    const canvas = document.getElementById('gameCanvas');
    let ctx = canvas.getContext('2d');
    const timerDisplay = document.getElementById('timerDisplay');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const remainPairsSpan = document.getElementById('remainPairs');
    const gameMsgDiv = document.getElementById('gameMsg');

    // 音效
    let audioCtx = null;
    function initAudio() {
        if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    }
    function playSfx(type) {
        try {
            initAudio();
            if(audioCtx.state==='suspended') audioCtx.resume();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g);
            g.connect(audioCtx.destination);
            let freq,dur,vol;
            switch(type){
                case 'click': freq=880; dur=0.08; vol=0.12; o.type='sine'; break;
                case 'match': freq=1180; dur=0.15; vol=0.18; o.type='sine'; break;
                case 'button': freq=720; dur=0.07; vol=0.1; o.type='sine'; break;
                case 'win': freq=990; dur=0.3; vol=0.25; o.type='sine';
                    o.frequency.setValueAtTime(990,audioCtx.currentTime+0.1);
                    o.frequency.setValueAtTime(1320,audioCtx.currentTime+0.2); break;
                case 'lose': freq=380; dur=0.4; vol=0.25; o.type='triangle'; break;
                case 'wrong': freq=320; dur=0.2; vol=0.2; o.type='triangle'; break;
                default: freq=440; dur=0.1; vol=0.1; o.type='sine';
            }
            o.frequency.value = freq;
            g.gain.value = vol;
            g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+dur);
            o.start();
            o.stop(audioCtx.currentTime+dur);
            if(navigator.vibrate) navigator.vibrate(type==='win'?[20,30,20]:(type==='wrong'?30:10));
        }catch(e){}
    }
    function unlockAudio() {
        initAudio();
        if(audioCtx.state==='suspended') audioCtx.resume();
        document.removeEventListener('touchstart',unlockAudio);
        document.removeEventListener('click',unlockAudio);
    }
    document.addEventListener('touchstart',unlockAudio);
    document.addEventListener('click',unlockAudio);

    function formatTime(s){
        const m=Math.floor(s/60);
        return `${m.toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
    }
    function updateUI(){
        scoreDisplay.textContent=currentScore;
        remainPairsSpan.textContent=remainingPairs;
        timerDisplay.textContent=formatTime(timeLeft);
    }
    function calcRemainingPairs(){
        let cnt=0;
        for(let i=0;i<ROWS;i++)for(let j=0;j<COLS;j++)if(grid[i][j]!==null)cnt++;
        return cnt/2;
    }
    function updateRemainingAndWin(){
        remainingPairs=calcRemainingPairs();
        updateUI();
        if(remainingPairs===0&&gameActive&&!gameWinFlag) gameWin();
    }

    function gameWin(){
        if(gameWinFlag) return;
        gameWinFlag=true; gameActive=false;
        clearInterval(timerInterval); timerInterval=null;

        // 剩余时间全部加分
        let timeBonus = timeLeft * SCORE_PER_REMAIN_SEC;
        currentScore += timeBonus;
        updateUI();

        playSfx('win');
        gameMsgDiv.textContent=`🎉 通关！时间加分 +${timeBonus} 总分${currentScore}`;
        drawGrid();
    }
    function gameLose(){
        if(!gameActive)return;
        gameActive=false; gameWinFlag=false;
        clearInterval(timerInterval); timerInterval=null;
        playSfx('lose');
        gameMsgDiv.textContent='⏰ 时间到！';
        drawGrid();
    }
    function startTimer(){
        clearInterval(timerInterval);
        timerInterval=setInterval(()=>{
            if(!gameActive)return;
            if(timeLeft<=1){
                timeLeft=0; updateUI(); gameLose();
            }else{
                timeLeft--; updateUI();
            }
        },1000);
    }

    function isHorizontalClear(r,c1,c2){
        const min=Math.min(c1,c2),max=Math.max(c1,c2);
        for(let c=min+1;c<max;c++)if(grid[r][c]!==null)return false;
        return true;
    }
    function isVerticalClear(c,r1,r2){
        const min=Math.min(r1,r2),max=Math.max(r1,r2);
        for(let r=min+1;r<max;r++)if(grid[r][c]!==null)return false;
        return true;
    }
    function canConnectDirect(r1,c1,r2,c2){
        return r1===r2?isHorizontalClear(r1,c1,c2):(c1===c2?isVerticalClear(c1,r1,r2):false);
    }
    function canConnectOneCorner(r1,c1,r2,c2){
        if(grid[r1][c2]===null&&isHorizontalClear(r1,c1,c2)&&isVerticalClear(c2,r1,r2))return true;
        if(grid[r2][c1]===null&&isVerticalClear(c1,r1,r2)&&isHorizontalClear(r2,c1,c2))return true;
        return false;
    }
    function canConnectTwoCorner(r1,c1,r2,c2){
        for(let i=0;i<ROWS;i++){
            if(i!==r1&&i!==r2&&grid[i][c1]===null&&grid[i][c2]===null){
                if(isVerticalClear(c1,r1,i)&&isHorizontalClear(i,c1,c2)&&isVerticalClear(c2,i,r2))return true;
            }
        }
        for(let j=0;j<COLS;j++){
            if(j!==c1&&j!==c2&&grid[r1][j]===null&&grid[r2][j]===null){
                if(isHorizontalClear(r1,c1,j)&&isVerticalClear(j,r1,r2)&&isHorizontalClear(r2,j,c2))return true;
            }
        }
        return false;
    }
    function canConnect(r1,c1,r2,c2){
        if(r1===r2&&c1===c2)return false;
        if(grid[r1][c1]===null||grid[r2][c2]===null)return false;
        if(grid[r1][c1]!==grid[r2][c2])return false;
        return canConnectDirect(r1,c1,r2,c2)||canConnectOneCorner(r1,c1,r2,c2)||canConnectTwoCorner(r1,c1,r2,c2);
    }
    function existsAnyConnect(){
        for(let i=0;i<ROWS;i++)for(let j=0;j<COLS;j++){
            if(grid[i][j]===null)continue;
            for(let m=0;m<ROWS;m++)for(let n=0;n<COLS;n++){
                if(i===m&&j===n)continue;
                if(grid[m][n]!==null&&canConnect(i,j,m,n))return true;
            }
        }
        return false;
    }

    function shuffleRemainingOnly(){
        const list=[];
        for(let i=0;i<ROWS;i++)for(let j=0;j<COLS;j++)if(grid[i][j]!==null)list.push(grid[i][j]);
        for(let i=list.length-1;i>0;i--){
            const j=Math.floor(Math.random()*(i+1));
            [list[i],list[j]]=[list[j],list[i]];
        }
        let idx=0;
        for(let i=0;i<ROWS;i++)for(let j=0;j<COLS;j++)if(grid[i][j]!==null)grid[i][j]=list[idx++];
        clearSelectedAndHint();
    }
    function ensureSolvable(att=5){
        for(let i=0;i<att;i++)if(existsAnyConnect())return true; else shuffleRemainingOnly();
        return existsAnyConnect();
    }
    function shuffleGrid(){
        if(!gameActive){gameMsgDiv.textContent='游戏已结束';return;}
        playSfx('button');
        shuffleRemainingOnly();
        ensureSolvable(3);
        drawGrid();
        gameMsgDiv.textContent='🃏 已洗牌';
        setTimeout(()=>gameActive&&(gameMsgDiv.textContent='✨ 点击配对消除'),1200);
    }

    function clearSelectedAndHint(){
        selectedRow=selectedCol=hintRow1=hintCol1=hintRow2=hintCol2=null;
    }

    function eliminatePair(r1,c1,r2,c2){
        if(!canConnect(r1,c1,r2,c2))return false;
        grid[r1][c1]=grid[r2][c2]=null;
        currentScore += SCORE_PER_PAIR;
        timeLeft = Math.min(timeLeft+TIME_ADD_ON_MATCH, 999); // 正确+时间
        playSfx('match');
        updateRemainingAndWin();
        clearSelectedAndHint();
        drawGrid();
        if(remainingPairs>0&&!existsAnyConnect()&&gameActive){
            gameMsgDiv.textContent='⚠️ 无可用连接，自动洗牌';
            shuffleRemainingOnly(); ensureSolvable(3); drawGrid();
            setTimeout(()=>gameActive&&(gameMsgDiv.textContent='✨ 点击配对消除'),1500);
        }else{
            gameMsgDiv.textContent=`✔️ +${SCORE_PER_PAIR}分 +${TIME_ADD_ON_MATCH}秒`;
            setTimeout(()=>gameActive&&remainingPairs>0&&(gameMsgDiv.textContent='✨ 点击配对消除'),800);
        }
        return true;
    }

    function giveHint(){
        if(!gameActive){gameMsgDiv.textContent='游戏未开始';return;}
        if(remainingPairs===0){gameMsgDiv.textContent='🎉 已通关';return;}
        playSfx('button');
        for(let i=0;i<ROWS;i++)for(let j=0;j<COLS;j++){
            if(grid[i][j]===null)continue;
            for(let m=0;m<ROWS;m++)for(let n=0;n<COLS;n++){
                if(i===m&&j===n)continue;
                if(grid[m][n]!==null&&canConnect(i,j,m,n)){
                    hintRow1=i;hintCol1=j;hintRow2=m;hintCol2=n;
                    drawGrid();
                    gameMsgDiv.textContent=`💡 可消除`;
                    setTimeout(()=>{hintRow1=hintCol1=hintRow2=hintCol2=null;drawGrid();
                        gameActive&&(gameMsgDiv.textContent='✨ 点击配对消除');},2600);
                    return;
                }
            }
        }
        gameMsgDiv.textContent='⚠️ 无可消除，请洗牌';
    }

    // 核心修改：自适应画布尺寸
    function resizeAndRedraw(){
        // 获取容器尺寸，保持1:1比例
        const wrapper = document.querySelector('.canvas-wrapper');
        const wrapperWidth = wrapper.clientWidth;
        const wrapperHeight = wrapper.clientHeight;
        const size = Math.min(wrapperWidth, wrapperHeight);
        
        // 设置画布实际像素尺寸（保证清晰度）
        const dpr = window.devicePixelRatio || 1;
        canvas.width = size * dpr;
        canvas.height = size * dpr;
        canvas.style.width = `${size}px`;
        canvas.style.height = `${size}px`;
        
        // 缩放上下文，适配高清屏
        ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);
        
        drawGrid();
    }

    function drawGrid(){
        if(!ctx)return;
        const w = canvas.clientWidth; // 使用可视宽度计算单元格
        const cell = w / COLS;
        
        // 清空画布（使用实际像素尺寸）
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        for(let r=0;r<ROWS;r++){
            for(let c=0;c<COLS;c++){
                const x = c * cell;
                const y = r * cell;
                const v = grid[r][c];
                
                ctx.beginPath();
                ctx.rect(x, y, cell, cell);
                ctx.fillStyle = v === null ? '#d9cdb0' : '#fff0db';
                ctx.fill();
                ctx.strokeStyle = '#e2cba4'; 
                ctx.lineWidth = 1; 
                ctx.stroke();
                
                if(v!==null){
                    const f = cell * 0.45;
                    ctx.font = `500 ${f}px sans-serif`;
                    ctx.textAlign = 'center'; 
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = '#3a2410';
                    ctx.fillText(v, x + cell/2, y + cell/2);
                }
                
                // 选中状态
                if(selectedRow===r&&selectedCol===c&&v!==null){
                    ctx.strokeStyle = '#f7b32b'; 
                    ctx.lineWidth = 3;
                    ctx.strokeRect(x+3, y+3, cell-6, cell-6);
                }
                
                // 提示状态
                if((hintRow1===r&&hintCol1===c)||(hintRow2===r&&hintCol2===c)){
                    ctx.strokeStyle = '#ff6644'; 
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x+2, y+2, cell-4, cell-4);
                }
            }
        }

        // 游戏结束弹框（自适应）
        if(!gameActive){
            const w = canvas.clientWidth;
            const overlayWidth = w * 0.8;
            const overlayHeight = w * 0.4;
            const overlayX = (w - overlayWidth) / 2;
            const overlayY = (w - overlayHeight) / 2;
            const cornerRadius = 20;

            // 半透明背景
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, canvas.width / ctx.getTransform().a, canvas.height / ctx.getTransform().a);

            // 弹框阴影
            ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
            ctx.shadowBlur = 15;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 5;
            
            // 弹框背景
            ctx.beginPath();
            ctx.roundRect(overlayX, overlayY, overlayWidth, overlayHeight, cornerRadius);
            ctx.fillStyle = 'rgba(30, 30, 35, 0.95)';
            ctx.fill();
            
            // 弹框边框
            ctx.strokeStyle = '#f7b32b';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // 清除阴影
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;

            // 弹框文字（自适应大小）
            const titleFontSize = w / 16;
            ctx.font = `bold ${titleFontSize}px system-ui`;
            ctx.fillStyle = '#ffecb3';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(gameWinFlag ? '✨ 胜利 ✨' : '⏰ 时间到！', w / 2, w / 2);

            // 辅助文字
            const subFontSize = w / 28;
            ctx.font = `500 ${subFontSize}px system-ui`;
            ctx.fillStyle = '#aaa';
            ctx.fillText('点击“新局”按钮重新开始', w / 2, w / 2 + w / 16);
        }
    }

    // 适配电脑端鼠标点击和手机端触摸
    function handleTap(e){
        e.preventDefault();
        if(!gameActive||remainingPairs===0)return;
        
        const rect = canvas.getBoundingClientRect();
        let clientX, clientY;
        
        // 区分触摸和鼠标事件
        if(e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        
        // 计算相对坐标（适配画布缩放）
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = (clientX - rect.left) * scaleX / (window.devicePixelRatio || 1);
        const y = (clientY - rect.top) * scaleY / (window.devicePixelRatio || 1);
        
        const c = Math.floor(x / (canvas.clientWidth / COLS));
        const r = Math.floor(y / (canvas.clientHeight / ROWS));
        
        if(r<0||r>=ROWS||c<0||c>=COLS||grid[r][c]===null)return;

        if(selectedRow!==null&&selectedCol!==null){
            if(selectedRow===r&&selectedCol===c){
                clearSelectedAndHint(); 
                drawGrid();
                return;
            }
            if(canConnect(selectedRow,selectedCol,r,c)){
                eliminatePair(selectedRow,selectedCol,r,c);
            }else{
                // 错误扣时间
                timeLeft = Math.max(0, timeLeft-TIME_MINUS_ON_WRONG);
                updateUI();
                playSfx('wrong');
                selectedRow=r; selectedCol=c;
                gameMsgDiv.textContent=`❌ 错误 -${TIME_MINUS_ON_WRONG}秒`;
                setTimeout(()=>gameActive&&(gameMsgDiv.textContent='✨ 点击配对消除'),1000);
                if(timeLeft<=0) gameLose();
            }
        }else{
            selectedRow=r; selectedCol=c; 
            playSfx('click');
            gameMsgDiv.textContent=`🔸 已选中`;
        }
        drawGrid();
    }

    function resetGame(){
        clearInterval(timerInterval);
        gameActive=true; gameWinFlag=false;
        timeLeft=TIME_LIMIT; currentScore=0;
        clearSelectedAndHint();

        const pool=[];
        ICON_SET.forEach(ic=>{for(let k=0;k<PAIR_COUNT_PER_TYPE;k++)pool.push(ic);});
        for(let i=pool.length-1;i>0;i--){
            const j=Math.floor(Math.random()*(i+1));
            [pool[i],pool[j]]=[pool[j],pool[i]];
        }
        grid=Array(ROWS).fill().map(()=>Array(COLS).fill(null));
        let idx=0;
        for(let i=0;i<ROWS;i++)for(let j=0;j<COLS;j++)grid[i][j]=pool[idx++];

        remainingPairs=calcRemainingPairs();
        updateUI();
        if(!existsAnyConnect())shuffleRemainingOnly();
        resizeAndRedraw();
        startTimer();
        playSfx('button');
        gameMsgDiv.textContent='✨ 新局开始';
    }

    // 绑定多端交互事件
    canvas.addEventListener('touchstart', e => {e.preventDefault(); handleTap(e);});
    canvas.addEventListener('click', handleTap);
    // 按钮增加hover效果（电脑端）
    document.querySelectorAll('.btn').forEach(btn => {
        btn.addEventListener('mouseenter', () => {
            if(!btn.classList.contains('btn-primary')) {
                btn.style.background = '#ffe8c0';
            } else {
                btn.style.background = '#ffb858';
            }
        });
        btn.addEventListener('mouseleave', () => {
            if(!btn.classList.contains('btn-primary')) {
                btn.style.background = '#fff0da';
            } else {
                btn.style.background = '#ffcd7e';
            }
        });
    });
    document.getElementById('shuffleBtn').onclick=shuffleGrid;
    document.getElementById('hintBtn').onclick=giveHint;
    document.getElementById('resetBtn').onclick=resetGame;
    
    // 监听窗口大小变化，实时适配
    window.addEventListener('resize', resizeAndRedraw);
    // 初始加载时适配
    window.addEventListener('load', resizeAndRedraw);
    
    resetGame();
})();
</script>
</body>
</html>
