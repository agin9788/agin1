<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>经典扫雷 · 地雷清除者</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #6b6b6b 0%, #3a3a3a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', 'Microsoft YaHei', monospace;
            margin: 0;
            padding: 20px;
        }

        .minesweeper-container {
            background: #b0b0b0;
            border-radius: 20px;
            padding: 20px 25px 25px 25px;
            box-shadow: 8px 8px 16px rgba(0, 0, 0, 0.4), inset -1px -1px 0 #6e6e6e, inset 1px 1px 0 #ffffff;
        }

        .game-panel {
            background: #808080;
            border-radius: 12px;
            padding: 16px;
            box-shadow: inset 1px 1px 0 #dfdfdf, inset -1px -1px 0 #4a4a4a;
        }

        /* 信息栏 */
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #c0c0c0;
            padding: 8px 20px;
            margin-bottom: 20px;
            border-radius: 40px;
            box-shadow: inset 0 1px 3px #6e6e6e, 0 2px 2px rgba(0,0,0,0.2);
            font-weight: bold;
        }

        .counter {
            background: #000000;
            color: #ff3333;
            font-family: 'Courier New', monospace;
            font-size: 32px;
            font-weight: bold;
            padding: 2px 12px;
            border-radius: 10px;
            text-shadow: 0 0 3px #ff0000;
            letter-spacing: 3px;
            box-shadow: inset 0 0 5px #444;
            line-height: 1;
        }

        .reset-btn {
            background: #c0c0c0;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 28px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 3px 3px 6px #6e6e6e, -2px -2px 4px #ffffff;
            transition: 0.05s linear;
            color: #5a3e1b;
            background: #d4d4d4;
        }

        .reset-btn:active {
            transform: translate(2px, 2px);
            box-shadow: inset 2px 2px 4px #6e6e6e, inset -1px -1px 2px #ffffff;
        }

        .difficulty {
            background: #a0a0a0;
            border-radius: 32px;
            display: flex;
            gap: 8px;
            padding: 4px 12px;
            box-shadow: inset 1px 1px 0 #e0e0e0, inset -1px -1px 0 #5a5a5a;
        }

        .difficulty button {
            background: #bdbdbd;
            border: none;
            font-family: monospace;
            font-weight: bold;
            font-size: 14px;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 1px 1px 2px #6e6e6e, -1px -1px 1px #efefef;
            transition: 0.05s linear;
        }

        .difficulty button:active {
            transform: translate(1px, 1px);
            box-shadow: inset 1px 1px 2px #6e6e6e;
        }

        .difficulty .active-diff {
            background: #ffcd7e;
            color: #2d2b1f;
            box-shadow: inset 0 0 3px #8b6b3c;
        }

        canvas {
            display: block;
            margin: 12px auto;
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.4), inset 0 0 0 2px #e6e6e6;
            cursor: pointer;
            background: #c0c0c0;
            border-radius: 8px;
        }

        .status-msg {
            text-align: center;
            margin-top: 16px;
            font-weight: bold;
            background: #4a4a4a;
            display: inline-block;
            width: 100%;
            border-radius: 32px;
            padding: 8px 0;
            color: #ffeaac;
            font-family: monospace;
            letter-spacing: 1px;
            font-size: 0.9rem;
            box-shadow: inset 0 0 6px #1e1e1e;
        }

        @media (max-width: 600px) {
            .minesweeper-container {
                padding: 15px;
            }
            .counter {
                font-size: 26px;
                padding: 0 8px;
            }
            .reset-btn {
                width: 40px;
                height: 40px;
                font-size: 24px;
            }
            .difficulty button {
                padding: 4px 10px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
<div class="minesweeper-container">
    <div class="game-panel">
        <div class="info-bar">
            <div class="counter" id="mineCounter">010</div>
            <div class="reset-btn" id="resetButton">😊</div>
            <div class="counter" id="timerCounter">000</div>
        </div>
        <div class="difficulty" style="justify-content: center; margin-bottom: 15px;">
            <button data-diff="beginner" class="active-diff">🌱 初级</button>
            <button data-diff="intermediate">⚙️ 中级</button>
            <button data-diff="expert">💀 高级</button>
        </div>
        <canvas id="gameCanvas" width="450" height="450"></canvas>
        <div class="status-msg" id="gameStatusMsg">▶ 左键翻开  右键标记旗子 ◀</div>
    </div>
</div>

<script>
    (function(){
        // ---------- 难度配置 ----------
        const DIFFICULTY = {
            beginner: { rows: 9, cols: 9, mines: 10, cellSize: 40 },
            intermediate: { rows: 16, cols: 16, mines: 40, cellSize: 32 },
            expert: { rows: 16, cols: 30, mines: 99, cellSize: 28 }
        };
        
        // 当前难度
        let currentDiff = 'beginner';
        let rows = 9, cols = 9, mineCount = 10;
        let cellSize = 40;
        
        // 核心数据
        let board = [];       // 存储每个格子的原始值: -1表示雷, 0-8表示周边雷数
        let revealed = [];    // 是否已被翻开 (boolean)
        let flagged = [];     // 是否被插旗子 (boolean)
        
        let gameActive = true;      // 游戏是否进行中 (未输未赢)
        let firstMove = true;       // 是否还未进行第一次点击 (用于保证第一次不踩雷)
        let winFlag = false;
        
        let startTime = null;
        let timerInterval = null;
        let currentTimer = 0;
        
        let remainingFlags = 0;      // 剩余旗子数 (显示用)
        
        // DOM 元素
        const canvas = document.getElementById('gameCanvas');
        let ctx = canvas.getContext('2d');
        const mineCounterSpan = document.getElementById('mineCounter');
        const timerCounterSpan = document.getElementById('timerCounter');
        const resetBtn = document.getElementById('resetButton');
        const statusMsgDiv = document.getElementById('gameStatusMsg');
        const diffBtns = document.querySelectorAll('[data-diff]');
        
        // ---------- 辅助函数 ----------
        function formatCounter(num) {
            return num.toString().padStart(3, '0').slice(0, 3);
        }
        
        function updateUI() {
            // 剩余旗子显示 : 剩余未标记的雷数 = 总雷数 - 已经放置旗子数量
            let flaggedCount = flagged.flat().filter(v => v === true).length;
            let remain = mineCount - flaggedCount;
            mineCounterSpan.innerText = formatCounter(Math.max(remain, 0));
            timerCounterSpan.innerText = formatCounter(currentTimer);
        }
        
        // 停止计时器
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }
        
        // 开始计时 (仅在第一次有效点击时触发)
        function startTimerOnFirstMove() {
            if (startTime !== null) return;
            startTime = Date.now();
            if (timerInterval) stopTimer();
            timerInterval = setInterval(() => {
                if (!gameActive) return;
                if (startTime) {
                    let elapsed = Math.floor((Date.now() - startTime) / 1000);
                    if (elapsed !== currentTimer) {
                        currentTimer = elapsed;
                        timerCounterSpan.innerText = formatCounter(currentTimer);
                    }
                }
            }, 200);
        }
        
        // 重置计时器 (新游戏时)
        function resetTimer() {
            stopTimer();
            startTime = null;
            currentTimer = 0;
            timerCounterSpan.innerText = formatCounter(0);
        }
        
        // 根据难度重新初始化尺寸 & 画布
        function applyDifficulty() {
            const cfg = DIFFICULTY[currentDiff];
            rows = cfg.rows;
            cols = cfg.cols;
            mineCount = cfg.mines;
            cellSize = cfg.cellSize;
            canvas.width = cols * cellSize;
            canvas.height = rows * cellSize;
            canvas.style.width = `${canvas.width}px`;
            canvas.style.height = `${canvas.height}px`;
            // 重置游戏状态 (不自动开始，等待新游戏初始化)
            resetGameState();
        }
        
        // 全新生成雷区 (不触发第一次保护逻辑，纯随机)
        function generateBoard(excludeRow = -1, excludeCol = -1) {
            // 创建空白板
            let newBoard = Array(rows).fill().map(() => Array(cols).fill(0));
            let totalCells = rows * cols;
            let minesPlaced = 0;
            // 随机布雷，避开排除坐标
            while (minesPlaced < mineCount) {
                let r = Math.floor(Math.random() * rows);
                let c = Math.floor(Math.random() * cols);
                if (newBoard[r][c] === -1) continue;
                if (excludeRow === r && excludeCol === c) continue;
                newBoard[r][c] = -1;
                minesPlaced++;
            }
            // 计算数字
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    if (newBoard[i][j] === -1) continue;
                    let cnt = 0;
                    for (let dx = -1; dx <= 1; dx++) {
                        for (let dy = -1; dy <= 1; dy++) {
                            if (dx === 0 && dy === 0) continue;
                            let ni = i + dx, nj = j + dy;
                            if (ni >= 0 && ni < rows && nj >= 0 && nj < cols && newBoard[ni][nj] === -1) cnt++;
                        }
                    }
                    newBoard[i][j] = cnt;
                }
            }
            return newBoard;
        }
        
        // 重置整个游戏状态 (清空标记，生成新雷区)
        function resetGameState(withNewBoard = true) {
            gameActive = true;
            winFlag = false;
            firstMove = true;
            stopTimer();
            resetTimer();
            
            if (withNewBoard) {
                // 生成临时板子 (无排除)
                board = generateBoard();
            }
            // 重置翻开与旗子数组
            revealed = Array(rows).fill().map(() => Array(cols).fill(false));
            flagged = Array(rows).fill().map(() => Array(cols).fill(false));
            remainingFlags = mineCount;
            updateUI();
            drawCanvas();
            statusMsgDiv.innerHTML = "▶ 左键翻开  右键标记旗子 ◀";
            statusMsgDiv.style.color = "#ffeaac";
        }
        
        // 重新开始 (保留当前难度)
        function newGame() {
            resetGameState(true);
            // 保证剩余旗子显示正确
            updateUI();
            drawCanvas();
        }
        
        // 胜利逻辑
        function winGame() {
            if (!gameActive) return;
            gameActive = false;
            winFlag = true;
            stopTimer();
            statusMsgDiv.innerHTML = "🎉 胜利！ 完美拆除所有地雷 🎉";
            statusMsgDiv.style.color = "#d4ff7e";
            drawCanvas(); // 展示所有旗子正确的样式?
        }
        
        // 失败逻辑 (显示所有雷)
        function loseGame(clickRow, clickCol) {
            if (!gameActive) return;
            gameActive = false;
            winFlag = false;
            stopTimer();
            statusMsgDiv.innerHTML = "💣 踩到地雷！游戏结束 💣";
            statusMsgDiv.style.color = "#ffaa88";
            // 展示所有雷 (如果格子是雷且未标记旗子错误，最终显示雷)
            // 同时高亮踩中的雷
            drawCanvas(true, clickRow, clickCol);
        }
        
        // 递归展开空白区域 (深度优先)
        function revealEmptyArea(row, col) {
            if (row < 0 || row >= rows || col < 0 || col >= cols) return;
            // 已翻开 或者 旗子阻挡不可自动翻开(经典扫雷旗子格不会自动展开)
            if (revealed[row][col]) return;
            if (flagged[row][col]) return;
            if (board[row][col] === -1) return; // 安全起见不展开雷
            
            revealed[row][col] = true;
            
            if (board[row][col] === 0) {
                for (let dx = -1; dx <= 1; dx++) {
                    for (let dy = -1; dy <= 1; dy++) {
                        if (dx === 0 && dy === 0) continue;
                        let ni = row + dx, nj = col + dy;
                        if (ni >= 0 && ni < rows && nj >= 0 && nj < cols && !revealed[ni][nj] && !flagged[ni][nj]) {
                            revealEmptyArea(ni, nj);
                        }
                    }
                }
            }
        }
        
        // 检查胜利条件: 所有非雷格子均已翻开
        function checkVictory() {
            if (!gameActive) return false;
            let allSafeRevealed = true;
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    if (board[i][j] !== -1 && !revealed[i][j]) {
                        allSafeRevealed = false;
                        break;
                    }
                }
            }
            if (allSafeRevealed && gameActive) {
                winGame();
                drawCanvas();
                return true;
            }
            return false;
        }
        
        // 主要点击翻开逻辑 (左键)
        function leftClick(row, col) {
            if (!gameActive) return false;
            // 已翻开或者旗子保护的格子不能左键点击
            if (revealed[row][col]) return false;
            if (flagged[row][col]) {
                statusMsgDiv.innerHTML = "⚠️ 已标记旗子，请取消旗子后再翻开 ⚠️";
                return false;
            }
            
            // 第一次移动保护: 如果当前点击的是雷，重新生成雷区避开该位置
            if (firstMove) {
                startTimerOnFirstMove();
                if (board[row][col] === -1) {
                    // 重新生成雷区，确保这个点不是雷
                    board = generateBoard(row, col);
                    // 重置 flags 和 revealed (保留未翻开状态)
                    revealed = Array(rows).fill().map(() => Array(cols).fill(false));
                    flagged = Array(rows).fill().map(() => Array(cols).fill(false));
                    updateUI();
                    // 重新绘制后再处理本次点击，但注意递归调用避免死循环
                    drawCanvas();
                }
                firstMove = false;
            }
            
            // 现在正式处理点击
            if (board[row][col] === -1) {
                // 踩雷
                loseGame(row, col);
                return false;
            } else {
                // 翻开当前格子
                if (board[row][col] === 0) {
                    revealEmptyArea(row, col);
                } else {
                    revealed[row][col] = true;
                }
                drawCanvas();
                checkVictory();
                return true;
            }
        }
        
        // 右键标记旗子 / 取消旗子 (经典切换)
        function rightClick(row, col) {
            if (!gameActive) return;
            // 已翻开的格子不能标记旗子
            if (revealed[row][col]) return;
            
            // 切换旗子
            if (!flagged[row][col]) {
                // 旗子数量不能超过剩余雷数?? 视觉上限，只限制显示负值没用，但逻辑上无条件可标记，但剩余旗子显示会变负数, 我们限制旗子总数不超过总雷数? 更友好
                let flaggedCount = flagged.flat().filter(v => v === true).length;
                if (flaggedCount >= mineCount && !flagged[row][col]) {
                    statusMsgDiv.innerHTML = "⚠️ 旗子已达总雷数上限，无法继续标记 ⚠️";
                    return;
                }
                flagged[row][col] = true;
            } else {
                flagged[row][col] = false;
            }
            updateUI();
            drawCanvas();
            // 简单提示：标记后也不影响胜利检测, 但胜利瞬间仍然可以自动胜利
            checkVictory();
        }
        
        // ---------- canvas 绘图 (经典复古风格) ----------
        function drawCanvas(gameOverHighlightRow = null, gameOverHighlightCol = null) {
            if (!ctx) return;
            const w = canvas.width, h = canvas.height;
            ctx.clearRect(0, 0, w, h);
            
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    let x = j * cellSize;
                    let y = i * cellSize;
                    const isRevealed = revealed[i][j];
                    const isFlagged = flagged[i][j];
                    const value = board[i][j];
                    
                    // 绘制格子外框 (经典凸起/凹陷)
                    if (!isRevealed) {
                        // 未翻开样式: 凸起
                        ctx.fillStyle = "#b0b0b0";
                        ctx.fillRect(x, y, cellSize-1, cellSize-1);
                        ctx.fillStyle = "#d4d4d4";
                        ctx.fillRect(x+1, y+1, cellSize-3, cellSize-3);
                        ctx.strokeStyle = "#ffffff";
                        ctx.strokeRect(x+1, y+1, cellSize-3, cellSize-3);
                        ctx.strokeStyle = "#6e6e6e";
                        ctx.strokeRect(x, y, cellSize-1, cellSize-1);
                        
                        // 绘制旗子
                        if (isFlagged) {
                            ctx.font = `bold ${Math.floor(cellSize * 0.6)}px "Segoe UI", system-ui`;
                            ctx.fillStyle = "#cc3f3f";
                            ctx.shadowBlur = 0;
                            ctx.fillText("🚩", x + cellSize * 0.25, y + cellSize * 0.8);
                        }
                    } else {
                        // 已翻开样式: 凹陷
                        ctx.fillStyle = "#9e9e9e";
                        ctx.fillRect(x, y, cellSize-1, cellSize-1);
                        ctx.fillStyle = "#bababa";
                        ctx.fillRect(x+1, y+1, cellSize-3, cellSize-3);
                        ctx.strokeStyle = "#5a5a5a";
                        ctx.strokeRect(x+1, y+1, cellSize-3, cellSize-3);
                        
                        if (value === -1) {
                            // 显示地雷
                            ctx.font = `${Math.floor(cellSize * 0.55)}px "Segoe UI", system-ui`;
                            ctx.fillStyle = "#1a1a1a";
                            ctx.fillText("💣", x + cellSize * 0.25, y + cellSize * 0.75);
                        } else if (value > 0) {
                            ctx.font = `bold ${Math.floor(cellSize * 0.5)}px "Courier New", monospace`;
                            ctx.textAlign = "center";
                            ctx.textBaseline = "middle";
                            const colors = ["", "#1976D2", "#2E7D32", "#D32F2F", "#4A148C", "#FF8C00", "#00ACC1", "#880E4F", "#3E2723"];
                            ctx.fillStyle = colors[value] || "#000";
                            ctx.fillText(value, x + cellSize/2, y + cellSize/2);
                            ctx.textAlign = "left";
                        }
                    }
                    
                    // 特殊: 游戏结束时显示错误旗子或者未标记的雷
                    if (!gameActive && !winFlag) {
                        // 若是雷没被标记 或者 标记错误额外显示，以及踩中的高亮
                        if (value === -1) {
                            if (!isRevealed && !isFlagged) {
                                // 未翻开未旗子的雷，显示地雷
                                ctx.font = `${Math.floor(cellSize * 0.55)}px "Segoe UI"`;
                                ctx.fillStyle = "#333";
                                ctx.fillText("💣", x + cellSize * 0.25, y + cellSize * 0.75);
                            } else if (isFlagged && !isRevealed && (gameOverHighlightRow !== i || gameOverHighlightCol !== j)) {
                                // 旗子正确, 可额外加个绿色标记? 保持原样
                            } else if (isRevealed && value === -1) {
                                // 已经翻开炸雷，红色背景标识
                                ctx.fillStyle = "#f08080";
                                ctx.fillRect(x, y, cellSize-1, cellSize-1);
                                ctx.font = `${Math.floor(cellSize * 0.55)}px "Segoe UI"`;
                                ctx.fillStyle = "#a10000";
                                ctx.fillText("💣", x + cellSize * 0.25, y + cellSize * 0.75);
                            }
                        }
                        // 高亮踩中的雷
                        if (gameOverHighlightRow === i && gameOverHighlightCol === j && value === -1) {
                            ctx.fillStyle = "#ff6666";
                            ctx.fillRect(x, y, cellSize-1, cellSize-1);
                            ctx.font = `bold ${Math.floor(cellSize * 0.6)}px "Segoe UI"`;
                            ctx.fillStyle = "#ff0000";
                            ctx.fillText("💥", x + cellSize * 0.25, y + cellSize * 0.75);
                        }
                        
                        // 显示错误旗子(不是雷却插旗)
                        if (!gameActive && !winFlag && !isRevealed && isFlagged && value !== -1) {
                            ctx.font = `bold ${Math.floor(cellSize * 0.45)}px system-ui`;
                            ctx.fillStyle = "#aaaaaa";
                            ctx.fillText("❌", x + cellSize * 0.65, y + cellSize * 0.3);
                        }
                    }
                    
                    // 画网格线
                    ctx.beginPath();
                    ctx.strokeStyle = "#6e6e6e";
                    ctx.lineWidth = 0.8;
                    ctx.strokeRect(x, y, cellSize, cellSize);
                }
            }
            // 如果胜利所有展示但没有额外特效，已经胜利
            if (winFlag && gameActive === false) {
                ctx.font = `bold ${Math.floor(cellSize * 1.2)}px monospace`;
                ctx.fillStyle = "#f9f9b2";
                ctx.shadowBlur = 4;
                ctx.fillText("WINNER", canvas.width/2-50, canvas.height/2);
            }
        }
        
        // ---------- 事件监听 (鼠标/触摸屏支持) ----------
        function getGridFromCoord(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            if (canvasX < 0 || canvasY < 0) return null;
            const col = Math.floor(canvasX / cellSize);
            const row = Math.floor(canvasY / cellSize);
            if (row >= 0 && row < rows && col >= 0 && col < cols) return { row, col };
            return null;
        }
        
        function handleLeftClick(e) {
            e.preventDefault();
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            const pos = getGridFromCoord(clientX, clientY);
            if (pos && gameActive) {
                leftClick(pos.row, pos.col);
                drawCanvas();
            } else if (!gameActive) {
                statusMsgDiv.innerHTML = winFlag ? "🏆 游戏已胜利，点击重置玩新局 🏆" : "💀 游戏已结束，按重置继续 💀";
            }
        }
        
        function handleRightClick(e) {
            e.preventDefault();
            let clientX, clientY;
            if (e.touches) {
                // 移动端双指模拟？这里简单用长按? 但为了右键标记，移动端通常长按触发，我们监听contextmenu和touchstart? 
                // 为了保证移动端体验: 长按触发标记，我们监听touchstart配合计时? 但为了避免复杂, 监听contextmenu已可阻止弹出菜单，利用触屏长按也会触发contextmenu事件。
                clientX = e.clientX;
                clientY = e.clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            const pos = getGridFromCoord(clientX, clientY);
            if (pos && gameActive) {
                rightClick(pos.row, pos.col);
                drawCanvas();
            }
            return false;
        }
        
        // 重置按钮逻辑
        function resetGameHandler() {
            newGame();
            drawCanvas();
        }
        
        // 切换难度
        function setDifficulty(level) {
            currentDiff = level;
            applyDifficulty();
            // 重新初始化新游戏状态（全新雷区）
            newGame();
            // 更新按钮样式
            diffBtns.forEach(btn => {
                if (btn.getAttribute('data-diff') === level) {
                    btn.classList.add('active-diff');
                } else {
                    btn.classList.remove('active-diff');
                }
            });
            drawCanvas();
        }
        
        // ---------- 挂载事件与初始化 ----------
        function init() {
            applyDifficulty();   // 设定默认初级画板+数据
            newGame();           // 生成雷区
            
            canvas.addEventListener('click', handleLeftClick);
            canvas.addEventListener('contextmenu', handleRightClick);
            // 移动端touch事件辅助 (避免click延迟冲突)
            canvas.addEventListener('touchstart', (e) => {
                // 默认左边单击，检测长按? 简单: 对于长按我们不做特殊，移动端起右键需要长按, 系统会自动触发contextmenu 我们已监听
                // 但为了防止双指误触，保留左键触摸即触发左键点击
                let touch = e.touches[0];
                let fakeEvent = { clientX: touch.clientX, clientY: touch.clientY };
                if (!gameActive) return;
                handleLeftClick(fakeEvent);
                e.preventDefault();
            }, { passive: false });
            
            resetBtn.addEventListener('click', resetGameHandler);
            
            for (let btn of diffBtns) {
                btn.addEventListener('click', (e) => {
                    const diff = btn.getAttribute('data-diff');
                    setDifficulty(diff);
                });
            }
            
            // 确保全局右键阻止
            window.addEventListener('contextmenu', (e) => {
                if (e.target === canvas || canvas.contains(e.target)) e.preventDefault();
            });
        }
        
        init();
    })();
</script>
</body>
</html>
